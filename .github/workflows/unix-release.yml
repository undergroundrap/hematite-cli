name: Unix Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-unix-release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libpcaudio-dev libsonic-dev

      - name: Restore voice model assets cache
        uses: actions/cache/restore@v4
        id: cache-voice
        with:
          path: .hematite/assets/voice
          key: kokoro-voice-assets-v1.0
          restore-keys: |
            kokoro-voice-assets-

      - name: Download voice model assets
        run: |
          mkdir -p .hematite/assets/voice
          base="https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0"
          [[ -f .hematite/assets/voice/kokoro-v1.0.onnx ]] || curl -L --retry 3 --max-time 300 -o .hematite/assets/voice/kokoro-v1.0.onnx "$base/kokoro-v1.0.onnx"
          [[ -f .hematite/assets/voice/voices.bin ]] || curl -L --retry 3 --max-time 120 -o .hematite/assets/voice/voices.bin "$base/voices-v1.0.bin"

      - name: Save voice model assets cache
        if: always() && steps.cache-voice.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .hematite/assets/voice
          key: kokoro-voice-assets-v1.0

      - name: Cache ORT library (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        id: cache-ort-lib
        with:
          path: ~/.cache/ort-lib
          key: ort-ms-1.24.2-x86_64-linux

      - name: Pre-fetch ORT library (Linux)
        if: runner.os == 'Linux' && steps.cache-ort-lib.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p ~/.cache/ort-lib
          ORT_URL="https://cdn.pyke.io/0/pyke:ort-rs/ms@1.24.2/x86_64-unknown-linux-gnu.tar.lzma2"
          for attempt in 1 2 3 4 5; do
            echo "ORT download attempt $attempt of 5..."
            curl -fSL --max-time 120 -o /tmp/ort.tar.lzma2 "$ORT_URL" && DOWNLOADED=1 && break
            DOWNLOADED=0
            [ $attempt -lt 5 ] && echo "Failed, retrying in 60s..." && sleep 60
          done
          if [ "${DOWNLOADED:-0}" = "0" ]; then
            echo "::warning::ORT pre-fetch failed — build will attempt inline download"
            exit 0
          fi
          python3 - <<'PYEOF'
import lzma, tarfile, pathlib, sys
dest = pathlib.Path.home() / ".cache/ort-lib"
dest.mkdir(parents=True, exist_ok=True)
try:
    with lzma.open("/tmp/ort.tar.lzma2") as f:
        with tarfile.open(fileobj=f) as tar:
            tar.extractall(dest)
    matches = sorted(dest.rglob("libonnxruntime.so*"))
    if matches:
        print(f"ORT library ready: {matches[0]}")
    else:
        print("WARNING: libonnxruntime.so not found after extraction", file=sys.stderr)
        sys.exit(1)
except Exception as e:
    print(f"Extraction error: {e}", file=sys.stderr)
    sys.exit(1)
PYEOF

      - name: Set ORT_LIB_LOCATION (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          LIB_DIR=$(find ~/.cache/ort-lib -name "libonnxruntime.so" -exec dirname {} \; 2>/dev/null | head -1)
          if [ -n "$LIB_DIR" ]; then
            echo "ORT_LIB_LOCATION=$LIB_DIR" >> "$GITHUB_ENV"
            echo "ORT_LIB_LOCATION=$LIB_DIR"
          else
            echo "::warning::ORT cache empty — build will download from CDN"
          fi

      - name: Build portable archive
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt $attempt..."
            bash ./scripts/package-unix.sh && break
            if [ $attempt -lt 3 ]; then
              echo "Build failed (attempt $attempt), retrying in 30s..."
              sleep 30
            else
              echo "All build attempts failed."
              exit 1
            fi
          done

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hematite-${{ runner.os }}
          path: dist/*/*.tar.gz

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*/*.tar.gz
